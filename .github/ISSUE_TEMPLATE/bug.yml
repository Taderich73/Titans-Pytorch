name: Bug report
description: Report a reproducible bug in OpenTitans
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much
        of the template as you can — the more context, the faster we can fix it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
      placeholder: "NeuralLongTermMemory crashes on CPU when chunk_size=1."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code snippet or command that reproduces the bug.
      render: python
      placeholder: |
        from titans import NeuralLongTermMemory
        m = NeuralLongTermMemory(...)
        m(x)  # raises
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include the full traceback.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OpenTitans version
      description: Output of `python -c "import titans; print(titans.__version__)"`.
      placeholder: "e.g. 0.7.0"
    validations:
      required: true

  - type: input
    id: torch-version
    attributes:
      label: PyTorch version
      description: Output of `python -c "import torch; print(torch.__version__)"`.
      placeholder: "2.4.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might help — hardware, CUDA version, related issues.
